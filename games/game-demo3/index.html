<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>快乐字母动物园</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-shell">
    <header class="top-panel">
      <h1>快乐字母动物园</h1>
      <p>点击动物卡片，听字母发音和动物叫声。</p>
    </header>

    <div class="lang-select" id="langSelect">
      <span>提示语言：</span>
      <button type="button" class="lang-button active" data-lang="zh">普通话</button>
      <button type="button" class="lang-button" data-lang="yue">粤语</button>
      <button type="button" class="lang-button" data-lang="en">English</button>
    </div>

    <section class="instruction">
      <p id="instructionText">请选择语言，然后点击字母动物卡片。</p>
    </section>

    <section class="cards" id="cards"></section>

    <div class="feedback" id="feedback"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
