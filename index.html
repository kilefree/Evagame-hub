<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eva游戏合集库</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
      font-family: 'Fredoka One', cursive;
    }
    .game-card {
      transition: all 0.3s ease;
      border: 3px solid #fff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .game-card:hover {
      transform: scale(1.05) rotate(2deg);
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
      border-color: #ffd700;
    }
    .game-card img {
      border-radius: 16px 16px 0 0;
    }
    .game-title {
      background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-size: 1.2rem;
      font-weight: bold;
    }
    header h1 {
      color: #fff;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      font-size: clamp(3rem, 8vw, 4rem);
    }
    header p {
      color: #fff;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
    }
  </style>
</head>

<body class="min-h-screen">
  <!-- 头部标题 -->
  <header class="py-10 text-center">
    <h1 class="text-[clamp(2rem,5vw,3rem)] font-bold text-gray-800">
      Eva小游戏天地
    </h1>
    <p class="text-gray-500 mt-2">点击卡片即可开始游玩</p>
  </header>

  <!-- 游戏容器 -->
  <main class="max-w-6xl mx-auto px-4 pb-16">
    <div id="gameContainer" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-5">
      <!-- JS 自动渲染卡片 -->
    </div>
  </main>

  <script>
    // 读取游戏配置 & 自动渲染卡片
    fetch("./games.json")
      .then(res => res.json())
      .then(list => {
        const container = document.getElementById("gameContainer");
        let html = "";
        list.forEach(item => {
          html += `
            <a href="${item.url}" target="_blank" class="block">
              <div class="game-card bg-white rounded-xl overflow-hidden shadow-md">
                <img src="${item.cover}" alt="${item.name}" class="w-full h-40 object-cover bg-gray-100">
                <div class="py-4 text-center game-title">${item.name}</div>
              </div>
            </a>
          `;
        });
        container.innerHTML = html;
      })
      .catch(err => {
        document.getElementById("gameContainer").innerHTML = "<p class='col-span-full text-center text-red-500'>游戏加载失败，请检查配置文件</p>";
      });
  </script>
</body>
</html>
